<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Clowder AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    .container { text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { font-size: 0.9rem; color: #9B7EBD; margin-bottom: 2rem; }
    .status {
      font-size: 0.85rem; color: #aaa; margin-top: 1.5rem;
      min-height: 1.2em;
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto;
      border: 3px solid rgba(155, 126, 189, 0.3);
      border-top-color: #9B7EBD;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Clowder AI</h1>
    <p class="subtitle">Multi-Agent Collaboration Platform</p>
    <div class="spinner"></div>
    <p class="status" id="status">Starting services...</p>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('splash-status', (_e, msg) => {
      document.getElementById('status').textContent = msg;
    });
  </script>
</body>
</html>
